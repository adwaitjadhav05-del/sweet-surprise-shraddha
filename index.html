<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For Shraddha ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to bottom, #a8e6cf, #56ab2f);
      color: white;
      text-align: center;
    }

    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470') no-repeat center/cover;
      opacity: 0.3;
      z-index: 0;
    }

    .flowers {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 1;
      opacity: 0.3;
    }

    .flower {
      position: absolute;
      font-size: 24px;
    }

    h1 {
      margin-top: 20px;
      font-size: 3em;
      z-index: 2;
      position: relative;
    }

    .sub {
      font-size: 1.5em;
      margin-top: 10px;
      z-index: 2;
      position: relative;
    }

    .countdown {
      font-size: 2em;
      margin-top: 20px;
      z-index: 2;
      position: relative;
    }

    .strawberry {
      position: absolute;
      font-size: 30px;
      animation: fall linear forwards;
    }

    @keyframes fall {
      to {
        transform: translateY(100vh);
      }
    }

    .pop {
      position: absolute;
      font-size: 20px;
      animation: pop 0.4s ease-out forwards;
    }

    @keyframes pop {
      from { transform: scale(0.5); opacity: 1; }
      to { transform: scale(2); opacity: 0; }
    }

    .hearts {
      position: absolute;
      bottom: 50px;
      width: 100%;
      font-size: 24px;
      animation: bounce 1s infinite;
      z-index: 2;
    }

    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .footer {
      position: absolute;
      bottom: 10px;
      width: 100%;
      z-index: 2;
    }
  </style>
</head>

<body>

<div class="overlay"></div>

<div class="flowers" id="flowers"></div>

<h1>🎂 2 Days To Go 🎂</h1>
<div class="sub">For My Love ❤️ Shraddha</div>
<div class="countdown" id="countdown"></div>

<div class="hearts">❤️ 💕 💖 💗</div>
<div class="footer">🍓 Something Sweet is Coming 🍓</div>

<!-- Background Music -->
<audio autoplay loop>
  <source src="https://www2.cs.uic.edu/~i101/SoundFiles/StarWars60.wav" type="audio/wav">
</audio>

<script>
  // FLOWERS
  const flowerContainer = document.getElementById("flowers");
  for (let i = 0; i < 40; i++) {
    let f = document.createElement("div");
    f.className = "flower";
    f.innerHTML = "🌸";
    f.style.left = Math.random() * 100 + "vw";
    f.style.top = Math.random() * 100 + "vh";
    flowerContainer.appendChild(f);
  }

  // COUNTDOWN
  const target = new Date();
  target.setDate(target.getDate() + 2);

  function updateCountdown() {
    const now = new Date();
    const diff = target - now;

    let h = Math.floor(diff / (1000 * 60 * 60));
    let m = Math.floor((diff / (1000 * 60)) % 60);
    let s = Math.floor((diff / 1000) % 60);

    document.getElementById("countdown").innerText =
      `⏳ ${h}h ${m}m ${s}s`;

  }

  setInterval(updateCountdown, 1000);

  // STRAWBERRIES
  function createStrawberry() {
    let s = document.createElement("div");
    s.className = "strawberry";
    s.innerHTML = "🍓";
    s.style.left = Math.random() * 100 + "vw";
    s.style.animationDuration = (2 + Math.random() * 2) + "s";

    document.body.appendChild(s);

    setTimeout(() => {
      let pop = document.createElement("div");
      pop.className = "pop";
      pop.innerHTML = "💥✨";
      pop.style.left = s.style.left;
      pop.style.top = "85vh";
      document.body.appendChild(pop);

      setTimeout(() => pop.remove(), 400);
      s.remove();
    }, 2500);
  }

  setInterval(createStrawberry, 700);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Shraddha ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to bottom, #a8e6cf, #56ab2f);
  text-align: center;
  color: white;
}

/* Nature background */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470') no-repeat center/cover;
  opacity: 0.3;
}

/* Heading */
h1 {
  margin-top: 30px;
  font-size: 3em;
  position: relative;
  z-index: 2;
}

/* Big Strawberry */
.big-strawberry {
  position: absolute;
  top: -150px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 120px;
  animation: fall 3s ease-in forwards;
}

@keyframes fall {
  to {
    top: 70%;
  }
}

/* Break effect */
.break {
  position: absolute;
  font-size: 60px;
  animation: breakAnim 0.5s forwards;
}

@keyframes breakAnim {
  from { transform: scale(0.5); opacity: 1; }
  to { transform: scale(1.5); opacity: 0; }
}

/* Message popup */
.popup {
  position: absolute;
  top: 40%;
  width: 100%;
  font-size: 3em;
  font-weight: bold;
  opacity: 0;
  animation: showText 1s forwards;
  animation-delay: 3s;
}

@keyframes showText {
  to { opacity: 1; transform: scale(1.1); }
}

</style>
</head>

<body>

<div class="overlay"></div>

<h1>For My Love ❤️ Shraddha</h1>

<!-- Big Strawberry -->
<div class="big-strawberry" id="strawberry">🍓</div>

<!-- Message -->
<div class="popup">💖 ONLY 2 DAYS REMAINING 💖</div>

<script>

// After fall, create break effect
setTimeout(() => {
  const s = document.getElementById("strawberry");

  // Remove main strawberry
  s.style.display = "none";

  // Create break pieces
  for (let i = 0; i < 6; i++) {
    let part = document.createElement("div");
    part.className = "break";
    part.innerHTML = "🍓";
    part.style.left = (45 + Math.random() * 10) + "%";
    part.style.top = "70%";
    document.body.appendChild(part);

    setTimeout(() => part.remove(), 500);
  }

}, 3000);

</script>

</body>
</html>
